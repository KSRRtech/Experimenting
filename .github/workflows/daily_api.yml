name: Daily API Generation

on:
  schedule:
    - cron: "0 0 * * *"   # midnight UTC every day
  workflow_dispatch:        # manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  generate-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic fastapi pydantic uvicorn

      - name: Generate new API endpoint
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_api.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat(api): add $(date +'%Y-%m-%d') daily endpoint"
          git push
